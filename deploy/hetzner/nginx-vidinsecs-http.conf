# Initial HTTP-only config — use BEFORE certbot
# After certbot, replace with nginx-vidinsecs.conf

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

upstream vidinsecs_node {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name vidinsecs.com www.vidinsecs.com;

    root /var/www/vidinsecs/client/dist;
    index index.html;

    server_tokens off;
    access_log /var/log/nginx/vidinsecs.access.log;
    error_log  /var/log/nginx/vidinsecs.error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://vidinsecs_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}