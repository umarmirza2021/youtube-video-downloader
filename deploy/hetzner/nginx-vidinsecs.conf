# /etc/nginx/sites-available/vidinsecs.com
# Symlink: ln -s /etc/nginx/sites-available/vidinsecs.com /etc/nginx/sites-enabled/

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_status 429;

map $http_user_agent $bad_bot {
    default 0;
    ~*(?:wget|curl|python-requests|scrapy|httpclient|java/|libwww) 1;
}

upstream vidinsecs_node {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name vidinsecs.com www.vidinsecs.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vidinsecs.com www.vidinsecs.com;

    # Certbot-managed certs (backup to Cloudflare Full SSL)
    ssl_certificate     /etc/letsencrypt/live/vidinsecs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vidinsecs.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/vidinsecs/client/dist;
    index index.html;

    server_tokens off;
    client_max_body_size 2m;

    access_log /var/log/nginx/vidinsecs.access.log;
    error_log  /var/log/nginx/vidinsecs.error.log warn;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/ {
        if ($bad_bot) { return 403; }

        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://vidinsecs_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;

        # API — never cache
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location /assets/ {
        expires 4h;
        add_header Cache-Control "public, max-age=14400, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 4h;
        add_header Cache-Control "public, max-age=14400";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}