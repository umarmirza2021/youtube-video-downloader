# Render Blueprint — full-stack (UI + API on one URL)
# Deploy: dashboard.render.com → New → Blueprint → connect GitHub repo
services:
  - type: web
    name: media-downloader
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        sync: false
        # Set to your Render URL or custom domain, e.g. https://media-downloader.onrender.com
      - key: VITE_SITE_URL
        sync: false
        # Same as public URL — used at build time for sitemap/canonical
      - key: VITE_GITHUB_URL
        sync: false
        optional: true
      - key: RAPIDAPI_KEY
        sync: false
        optional: true
      - key: RAPIDAPI_HOST
        sync: false
        optional: true
      - key: RAPIDAPI_INSTAGRAM_HOST
        sync: false
        optional: true
      - key: RAPIDAPI_TIKTOK_HOST
        sync: false
        optional: true