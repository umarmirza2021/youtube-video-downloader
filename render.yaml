# Render Blueprint — full-stack (UI + API on one URL)
# Repo: https://github.com/umarmirza2021/youtube-video-downloader
services:
  - type: web
    name: youtube-video-downloader
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://youtube-video-downloader.onrender.com
      - key: VITE_SITE_URL
        value: https://youtube-video-downloader.onrender.com
      - key: VITE_GITHUB_URL
        value: https://github.com/umarmirza2021/youtube-video-downloader
      - key: RAPIDAPI_KEY
        sync: false
        optional: true
      - key: RAPIDAPI_HOST
        sync: false
        optional: true
      - key: RAPIDAPI_INSTAGRAM_HOST
        sync: false
        optional: true
      - key: RAPIDAPI_TIKTOK_HOST
        sync: false
        optional: true